name = "horizontal-rule-interrupts-paragraph"
description = "Thematic breaks (***,  ___,  * * *) should interrupt a paragraph per GFM spec В§4.1"
width = 80

# --- is a setext heading underline, not a thematic break, so it's excluded here.
# Only ***, ___, and spaced variants are tested.

# *** interrupts paragraph
[[chunks]]
input = "Foo\n"
emit = ""

[[chunks]]
input = "***\n"
emit = "Foo\n\n\u001b[2mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\u001b[0m\n\n"

[[chunks]]
input = "bar\n\n"
emit = "bar\n\n"

