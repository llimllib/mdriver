name = "list-number-preservation"
description = "List numbers should be preserved from markdown. Indented content after blank line is list continuation."

[[chunks]]
input = "1. First\n"
emit = ""

[[chunks]]
input = "2. Second\n"
emit = ""

# Blank line in the list
[[chunks]]
input = "\n"
emit = ""

# 4-space indented content is list continuation per GFM spec
# Emits the list items first, then starts continuation paragraph
[[chunks]]
input = "    code block\n"
emit = "  1. First\n  2. Second\n\n"

# Blank line ends the continuation paragraph
[[chunks]]
input = "\n"
emit = "code block\n\n"

# New list item (number preserved)
[[chunks]]
input = "3. Third\n"
emit = ""

[[chunks]]
input = "\n"
emit = ""

[[chunks]]
input = "done\n"
emit = "  3. Third\n\n"

[[chunks]]
input = "\n"
emit = "done\n\n"
