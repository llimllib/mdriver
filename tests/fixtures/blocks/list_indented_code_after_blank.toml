name = "list-indented-code-after-blank"
description = "Indented content after a blank line in a list is list continuation per GFM spec (not an indented code block)"

# Start a list item
[[chunks]]
input = "3. Install homebrew\n"
emit = ""

# Blank line - could be loose list or end of list
[[chunks]]
input = "\n"
emit = ""

# 4-space indented content - list continuation paragraph, not indented code
# Emits the list items, then starts a continuation paragraph
[[chunks]]
input = "    echo hello\n"
emit = "  3. Install homebrew\n\n"

# Blank line ends the continuation paragraph
[[chunks]]
input = "\n"
emit = "echo hello\n\n"

# Next list item starts a new list
[[chunks]]
input = "4. Next item\n"
emit = ""

[[chunks]]
input = "\n"
emit = ""

[[chunks]]
input = "done\n"
emit = "  4. Next item\n\n"

[[chunks]]
input = "\n"
emit = "done\n\n"
